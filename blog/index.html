<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Blog — Jeffrey Potts</title>
<meta name="description" content="Notes, updates, and stories from Jeffrey Potts." />
<style>
  :root {
    --cream:      #ede3cf;
    --paper:      #f5efe1;
    --teal:       #234e58;
    --teal-dark:  #17343b;
    --gold:       #c9a24b;
    --gold-soft:  #d8b36a;
    --rust:       #b5442e;
    --ink:        #2a2622;
    --muted:      #6f6a5c;
    --line:       rgba(42,38,34,0.14);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: Georgia, 'Times New Roman', serif; color: var(--ink);
    background: var(--cream); line-height: 1.7; -webkit-font-smoothing: antialiased;
  }
  h1, h2, .nav-brand, .eyebrow {
    font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 700; color: var(--teal-dark);
  }
  .eyebrow { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.16em; color: var(--rust); }
  .wrap { width: 100%; max-width: 760px; margin: 0 auto; padding: 0 24px; }
  header { padding: 26px 0; border-bottom: 1px solid var(--line); background: var(--paper); }
  .nav-brand { text-decoration: none; font-size: 1.05rem; letter-spacing: 0.08em; text-transform: uppercase; }
  main { padding: 56px 0 80px; }
  h1 { font-size: 2rem; margin: 10px 0 30px; }
  .post-list { list-style: none; padding: 0; margin: 0; }
  .post-list li { padding: 22px 0; border-bottom: 1px solid var(--line); }
  .post-list li:first-child { padding-top: 0; }
  .post-list a { color: var(--teal-dark); text-decoration: none; font-size: 1.25rem; font-weight: 700; font-family: 'Helvetica Neue', Arial, sans-serif; }
  .post-list a:hover { color: var(--rust); }
  .post-date { display: block; color: var(--muted); font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 0.85rem; margin-bottom: 6px; }
  .post-excerpt { margin: 8px 0 0; }
  .empty { color: var(--muted); }
  a { color: var(--rust); }
  footer { background: var(--teal-dark); color: var(--cream); padding: 30px 0; text-align: center; font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 0.85rem; }
  footer a { color: var(--gold-soft); }
</style>
</head>
<body>

<header>
  <div class="wrap">
    <a href="/" class="nav-brand">Jeffrey Potts</a>
  </div>
</header>

<main>
  <div class="wrap">
    <p class="eyebrow">The Blog</p>
    <h1>Notes from the desk</h1>

    <!--
      To publish a new post:
      1. Copy blog/index.html's header/footer chrome into a new file,
         e.g. blog/my-post-slug.html (see privacy.html for the same pattern).
      2. Add a <li> entry below, newest first.
    -->
    <ul class="post-list">
      <!-- <li>
        <a href="/blog/my-post-slug.html">Post Title</a>
        <span class="post-date">Month Day, Year</span>
        <p class="post-excerpt">A short teaser sentence or two.</p>
      </li> -->
    </ul>
    <p class="empty">No posts yet — <a href="/#signup">sign up for the newsletter</a> and you'll be the first to know when something new goes up.</p>
  </div>
</main>

<footer>
  <div class="wrap">
    &copy; <span id="year"></span> Jeffrey Potts. All rights reserved. &nbsp;·&nbsp; <a href="/">Back to the site</a>
  </div>
</footer>

<script>document.getElementById('year').textContent = new Date().getFullYear();</script>

</body>
</html>
